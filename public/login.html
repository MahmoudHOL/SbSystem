<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | SB Smart</title>
  <link rel="stylesheet" href="/css/login.css">
  <link rel="stylesheet" href="/css/electron-titlebar.css">
</head>
<body>
  <div class="bg-circuit" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- صفحة تسجيل الدخول: نصف شعار، نصف نموذج -->
  <div class="login-wrap">
    <!-- النصف الأول: الشعار مثل الصورة (خلفية ضبابية + SB, SB Smart, الجملة) -->
    <div class="login-brand-side">
      <div class="brand-blur"></div>
      <div class="brand-circuit" aria-hidden="true"></div>
      <div class="brand-content">
        <h1 class="brand-title">SB</h1>
        <p class="brand-sub">SB Smart</p>
        <p class="brand-tagline">From the starting point to the finishing point</p>
      </div>
    </div>

    <!-- النصف الثاني: نموذج تسجيل الدخول -->
    <div class="login-form-side">
      <div class="login-card">
        <div class="brand-in-card">
          <span class="brand-in-card-title">SB</span>
          <span class="brand-in-card-sub">SB Smart</span>
        </div>

        <form id="login-form" method="post" action="/login" autocomplete="on">
          <div class="form-group">
            <label for="username">اسم المستخدم أو البريد الإلكتروني</label>
            <input type="text" id="username" name="username" placeholder="أدخل اسم المستخدم" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-login">تسجيل الدخول</button>
          <p id="msg-error" class="msg-error" role="alert"></p>
        </form>

        <p class="login-footer">SB POS · conver_lang</p>
      </div>
    </div>
  </div>

  <script src="/js/electron-titlebar.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
