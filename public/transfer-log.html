<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سجل نقل المخزون | SB Smart</title>
  <link href="/vendor/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/vendor/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/warehouses.css">
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="فتح القائمة">
    <i class="fas fa-bars"></i>
  </button>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h5 class="mb-0">
        <i class="fas fa-tachometer-alt me-2"></i>
        لوحة التحكم
      </h5>
    </div>
    <div class="sidebar-body">
      <ul class="sidebar-nav">
        <li><a href="/dashboard"><i class="fas fa-home"></i> الرئيسية</a></li>
        <li><a href="/warehouses" class="active"><i class="fas fa-warehouse"></i> مخازن</a></li>
        <li><a href="/settings"><i class="fas fa-cog"></i> الإعدادات</a></li>
        <li class="mt-4"><a href="/logout" class="sidebar-logout"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a></li>
      </ul>
    </div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="main-content" id="mainContent">
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">
          <span class="brand-sb">SB</span><span class="brand-smart"> Smart</span>
        </span>
        <div class="navbar-nav ms-auto">
          <span class="navbar-text">
            <i class="fas fa-user me-1"></i>
            <span id="userDisplayName">...</span>
          </span>
        </div>
      </div>
    </nav>

    <div class="dashboard-container">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
          <h1 class="page-title mb-0">
            <i class="fas fa-history me-2"></i>
            سجل نقل المخزون
          </h1>
          <a href="/warehouses" class="btn btn-dashboard btn-info">
            <i class="fas fa-arrow-right me-1"></i>العودة إلى المخازن
          </a>
        </div>
        <p class="text-muted mb-4">متابعة عمليات النقل: من أي مخزن إلى أي مخزن، المنتجات المنقولة وكمياتها، ومن قام بالنقل.</p>

        <div class="warehouses-card card-table">
          <div class="table-responsive">
            <table class="table table-warehouses">
              <thead>
                <tr>
                  <th>#</th>
                  <th>من مخزن</th>
                  <th>إلى مخزن</th>
                  <th>عدد الأصناف</th>
                  <th>من قام</th>
                  <th>التاريخ</th>
                  <th>تفاصيل</th>
                </tr>
              </thead>
              <tbody id="transfer-log-tbody">
                <tr><td colspan="7" class="text-center text-muted">جاري التحميل...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center py-3 mt-5">
      <div class="container-fluid">
        <p class="mb-0 footer-text">
          <i class="fas fa-copyright me-1"></i>
          <span id="currentYear"></span> SB Smart · conver_lang
        </p>
      </div>
    </footer>
  </div>

  <script src="/vendor/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api-client.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/transfer-log.js"></script>
</body>
</html>
